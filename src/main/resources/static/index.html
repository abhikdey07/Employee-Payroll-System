<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="CareLink AI Employee Payroll Management System">

    <title>CareLink AI Payroll</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Lucide Icons -->

    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div id="app">

    <!-- =======================================================
         LOGIN
    ======================================================== -->

    <section id="login-page" style="display:none;">

        <div class="login-card">

            <div class="login-header">

                <div class="logo-icon">

                    <img src="/images/logo.png"
                         class="company-logo"
                         alt="CareLink AI">

                </div>

                <h1 class="logo-title">
                    CareLink AI
                </h1>

                <p class="login-subtitle">

                    Employee Payroll Management System

                </p>

            </div>

            <form id="login-form">

                <div class="input-group">

                    <span class="input-icon">

                        <i data-lucide="user"></i>

                    </span>

                    <input
                            id="login-username"
                            type="text"
                            placeholder="Username"
                            required>

                </div>

                <div class="input-group">

                    <span class="input-icon">

                        <i data-lucide="lock"></i>

                    </span>

                    <input
                            id="login-password"
                            type="password"
                            placeholder="Password"
                            required>

                    <button
                            type="button"
                            id="password-toggle"
                            class="btn-icon">

                        <i data-lucide="eye"></i>

                    </button>

                </div>

                <button
                        class="btn btn-primary login-btn"
                        type="submit">

                    Sign In

                </button>

            </form>

            <div class="login-footer">

                Secure administrator portal powered by
                <strong>CareLink AI</strong>

            </div>

        </div>

    </section>

    <!-- =======================================================
         MAIN LAYOUT
    ======================================================== -->

    <section id="main-layout" style="display:none;">

        <!-- Sidebar -->

        <aside id="sidebar">

            <div class="sidebar-header">

                <div class="sidebar-logo">

                    <img src="/images/logo.png"
                         alt="Logo"
                         style="width:28px;height:28px;object-fit:contain;">

                </div>

                <div>

                    <div class="sidebar-title">

                        CareLink AI

                    </div>

                    <small class="sidebar-subtitle">

                        Employee Payroll

                    </small>

                </div>

            </div>

            <nav class="sidebar-nav">

                <div
                        class="nav-item"
                        data-page="dashboard">

                    <span class="nav-icon">

                        <i data-lucide="layout-dashboard"></i>

                    </span>

                    <span>

                        Dashboard

                    </span>

                </div>

                <div
                        class="nav-item"
                        data-page="employees">

                    <span class="nav-icon">

                        <i data-lucide="users"></i>

                    </span>

                    <span>

                        Employees

                    </span>

                </div>

                <div
                        class="nav-item"
                        data-page="add-employee">

                    <span class="nav-icon">

                        <i data-lucide="user-plus"></i>

                    </span>

                    <span>

                        Add Employee

                    </span>

                </div>

                <div
                        class="nav-item"
                        data-page="payslips">

                    <span class="nav-icon">

                        <i data-lucide="file-text"></i>

                    </span>

                    <span>

                        Payslips

                    </span>

                </div>

                <div
                        class="nav-item"
                        data-page="generate-payslip">

                    <span class="nav-icon">

                        <i data-lucide="wallet"></i>

                    </span>

                    <span>

                        Generate Payroll

                    </span>

                </div>

            </nav>

            <div class="sidebar-spacer"></div>

            <div class="sidebar-footer">

                <div class="admin-info">

                    <div class="admin-avatar">

                        <i data-lucide="user-round"></i>

                    </div>

                    <div>

                        <strong id="sidebar-username">

                            Admin

                        </strong>

                        <br>

                        <small>

                            Administrator

                        </small>

                    </div>

                </div>

                <button
                        id="logout-btn"
                        class="btn-icon logout-btn"
                        title="Logout">

                    <i data-lucide="log-out"></i>

                </button>

            </div>

        </aside>

        <!-- ===================================================
             CONTENT
        =================================================== -->

        <main id="content">

    <header class="page-header">

        <div class="header-spacer"></div>

        <div class="header-right">

            <div class="session-info">

                <span class="session-dot"></span>

                Session

                <strong id="session-timer">

                    30:00

                </strong>

            </div>

            <div class="admin-avatar-small">

                <i data-lucide="user-round"></i>

            </div>

        </div>

    </header>

    <div id="page-content"></div>

</main>

</section>
        <!-- =======================================================
         TOAST CONTAINER
    ======================================================== -->

    <div id="toast-container"></div>

    <!-- =======================================================
         MODAL
    ======================================================== -->

    <div id="modal-overlay" style="display:none;">

        <div class="modal-card">

            <div class="modal-header">

                <h3 id="modal-title">

                    Modal Title

                </h3>

                <button
                        id="modal-close"
                        class="btn-icon"
                        type="button"
                        aria-label="Close">

                    <i data-lucide="x"></i>

                </button>

            </div>

            <div
                    class="modal-body"
                    id="modal-body">

            </div>

            <div
                    class="modal-footer"
                    id="modal-footer">

            </div>

        </div>

    </div>

</div>

<!-- =======================================================
     ICON INITIALIZATION
======================================================== -->

<script>

    document.addEventListener("DOMContentLoaded", () => {

        if (window.lucide) {

            lucide.createIcons();

        }

    });

</script>

<!-- =======================================================
     APPLICATION
======================================================== -->

<script src="/js/app.js"></script>

</body>

</html>
